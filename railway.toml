# =============================================================================
# DevMind — Railway deployment configuration
# =============================================================================
# Railway reads this file to understand how to build and run the service.
# Docs: https://docs.railway.app/reference/config-as-code
#
# This configures the WEBHOOK RECEIVER only (the FastAPI service).
# The Lambda processor is deployed separately via AWS console or CLI.
#
# Required environment variables (set in Railway dashboard > Variables):
#   GITHUB_WEBHOOK_SECRET
#   UPSTASH_REDIS_REST_URL
#   UPSTASH_REDIS_REST_TOKEN
#   QSTASH_TOKEN
#   LAMBDA_FUNCTION_URL
#   ENVIRONMENT=production
# =============================================================================

[build]
# Use our Dockerfile rather than Railway's Nixpacks auto-detection.
# Nixpacks would work too, but explicit Dockerfile gives us multi-stage
# builds (smaller image) and exact control over system deps (libssl, git).
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway's health check — must return 2xx within 10s of container start.
# Our /health endpoint returns {"status": "ok"} immediately with no deps.
healthcheckPath = "/health"
healthcheckTimeout = 10

# How long Railway waits for the container to respond to health checks
# before marking the deployment as failed. 30s accounts for Python cold
# start + uvicorn worker spin-up.
startCommand = ""  # use CMD from Dockerfile

# Restart policy: always restart on crash. Railway does this by default,
# but explicit is better than implicit.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Minimum number of replicas. Free tier supports 1.
# Scale to 2+ on a paid plan for zero-downtime deployments.
numReplicas = 1
