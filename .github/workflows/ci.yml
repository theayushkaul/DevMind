# =============================================================================
# DevMind — GitHub Actions CI
# =============================================================================
# Runs on every push to main and every pull request.
#
# Jobs:
#   test   — runs the full pytest suite (no network, no real API keys needed)
#   lint   — ruff for code style + mypy for type checking (optional, commented
#            out until type stubs are complete)
#
# Why no integration tests in CI?
#   Integration tests require a live PostgreSQL + pgvector instance and real
#   API keys. Running those in CI would require secrets management and a
#   Postgres service container. For a portfolio project, unit tests in CI +
#   manual integration testing locally is the right trade-off.
#   See: tests/integration/ (planned) for the integration test suite.
#
# Caching strategy:
#   pip dependencies are cached by requirements.txt hash. If requirements.txt
#   hasn't changed, the cache hit skips the install step (~60s saved per run).
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # Cache key includes OS, Python version, and requirements hash.
          # Any change to requirements.txt busts the cache and re-installs.
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install aiosqlite  # SQLite async driver for in-memory DB tests

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          # Provide dummy values for env vars that modules import-check.
          # Tests mock the actual clients — these just prevent RuntimeError
          # on missing env vars during module import in certain test paths.
          GROQ_API_KEY: dummy-not-used-in-tests
          GITHUB_WEBHOOK_SECRET: dummy-not-used-in-tests
          ENVIRONMENT: test

      - name: Upload test results
        if: always()  # upload even if tests fail — useful for diagnosing CI
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: |
            .coverage
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Docker build check — verifies the Dockerfile builds cleanly.
  # Does NOT push to a registry (no credentials needed for this check).
  # ---------------------------------------------------------------------------
  docker-build:
    name: Verify Docker build
    runs-on: ubuntu-latest
    needs: test  # only build if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          # Cache Docker layers between CI runs using GitHub Actions cache.
          # Dramatically speeds up subsequent builds when only app/ changes
          # (the pip install layer is cached).
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: devmind:ci-check
