# alembic.ini
# Alembic configuration for DevMind database migrations.
#
# Usage:
#   alembic upgrade head          — apply all pending migrations
#   alembic downgrade -1          — roll back one migration
#   alembic revision --autogenerate -m "description"  — generate new migration
#   alembic current               — show current migration version
#   alembic history               — show migration history
#
# The DATABASE_URL env var must be set before running any alembic command.
# For local dev: set it in .env and run `export $(cat .env | xargs)` first,
# or use `python-dotenv` via the env.py script.

[alembic]
script_location = app/db/migrations
prepend_sys_path = .

# Alembic reads the DB URL from env.py (which reads DATABASE_URL at runtime)
# rather than hardcoding it here — keeps secrets out of this file.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
